<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨界軸：萬界修正錄</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #333;
            --input-bg: #2a2a2a;
            --sub-text: #aaa;
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --input-bg: #f9fafb;
            --sub-text: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--text-color);
            text-align: center;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--sub-text);
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 12px 10px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.btn-secondary {
            background-color: #374151;
            color: #ffffff;
        }

        button.btn-secondary:hover {
            background-color: #4b5563;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2500;
            top: 0;
            left: 0;
            background-color: var(--card-bg);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            border-right: 1px solid var(--border-color);
        }

        .sidebar a {
            padding: 12px 20px;
            text-decoration: none;
            font-size: 15px;
            color: var(--text-color);
            display: block;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar a:hover {
            background-color: var(--input-bg);
        }

        .sidebar .menu-header {
            background-color: var(--accent-color);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }

        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
        }

        .hamburger-btn {
            background: #374151;
            border: none;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            background-color: #333;
        }

        /* 幾何風格大按鈕 */
        .geo-dungeon-btn {
            width: 100%;
            min-height: 130px;
            background: linear-gradient(135deg, #0f766e 0%, #0d9488 50%, #115e59 100%);
            border: 2px solid #2dd4bf;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #ffffff;
            box-shadow: 0 6px 15px rgba(13, 148, 136, 0.3);
            transition: all 0.3s ease;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
        }

        .geo-dungeon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 148, 136, 0.5);
            border-color: #5eead4;
        }

        /* 劇情與狀態面板樣式 */
        .story-panel {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            margin-top: 14px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <button class="close-btn" id="btn-close-nav">&times;</button>
        <a href="#" id="menu-home">🏠 系統首頁</a>
        <div class="menu-header">執行者設定</div>
        <a href="#" id="menu-profile">👤 玩家個人檔案設定</a>
        <div class="menu-header">系統管理</div>
        <a href="#" id="menu-settings">⚙️ 遊戲設定 (API / 模型 / 主題)</a>
        <a href="#" id="menu-logout" style="color: #ef4444;">🚪 離開系統 / 登出</a>
    </div>

    <div class="container">
        <!-- 介紹頁面 -->
        <div id="intro-screen">
            <h2>[臨界軸：萬界修正錄]</h2>
            <div style="background-color: var(--input-bg); padding: 18px; border-radius: 8px; margin: 16px 0; font-size: 15px; line-height: 1.6; text-align: center; border: 1px solid var(--border-color);">
                <p style="margin-top: 0; font-size: 18px; color: var(--accent-color); font-weight: bold;">想明白生命的意義嗎？想真正的……活著嗎？</p>
                <p style="color: var(--sub-text); font-size: 13px; margin-bottom: 0;">當你做出選擇的那一刻起，多元宇宙的命脈與修正錄便已將你鎖定。</p>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-yes">YES</button>
                <button type="button" class="btn-secondary" id="btn-no">NO</button>
            </div>
        </div>

        <!-- 登入頁面 -->
        <div id="auth-screen" style="display: none;">
            <h2>[臨界軸：萬界修正錄]</h2>
            <p style="text-align: center; color: var(--sub-text); font-size: 14px; margin-bottom: 20px;">請登入以同步您的雲端遊戲存檔</p>
            <div class="input-group">
                <label for="email-input">電子信箱 (Email)</label>
                <input type="email" id="email-input" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label for="password-input">密碼</label>
                <input type="password" id="password-input" placeholder="請輸入密碼 (至少 6 位數)">
            </div>
            <div class="btn-group">
                <button type="button" id="btn-login">登入</button>
                <button type="button" class="btn-secondary" id="btn-register">註冊新帳號</button>
            </div>
            <button type="button" class="btn-secondary" id="btn-back-intro" style="width: 100%; margin-top: 10px;">返回遊戲介紹</button>
        </div>

        <!-- 遊戲主畫面 -->
        <div id="game-screen" style="display: none;">
            <!-- 右上角頭像與導覽列 -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <button type="button" class="hamburger-btn" id="btn-open-nav">☰ 選單</button>
                
                <div id="btn-open-profile-modal" style="cursor: pointer; display: flex; align-items: center; gap: 8px; background: var(--input-bg); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color);">
                    <span id="top-display-name" style="font-size: 13px; font-weight: bold;">執行者</span>
                    <img id="top-display-avatar" src="" alt="頭像" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent-color);">
                </div>
            </div>

            <div id="section-home">
                <h2>主神空間大廳</h2>

                <!-- 幾何風格大按鈕：進入副本 -->
                <div style="margin: 16px 0; width: 100%;">
                    <button type="button" id="btn-enter-dungeon" class="geo-dungeon-btn">
                        <span style="font-size: 26px;">⚔️</span>
                        <span style="font-size: 18px; font-weight: bold; letter-spacing: 2px;">進入副本</span>
                        <span style="font-size: 12px; opacity: 0.8;">(開始遊戲與 AI 測試)</span>
                    </button>
                </div>

                <!-- 當前劇情面板 -->
                <div class="story-panel">
                    <div style="font-weight: bold; color: var(--accent-color); margin-bottom: 6px; border-bottom: 1px solid var(--border-color); padding-bottom: 4px;">📜 當前劇情與狀態面板</div>
                    <div id="story-summary" style="color: var(--sub-text); margin-bottom: 10px; line-height: 1.4;">劇情簡述：尚未進入副本，主神空間連結待機中...</div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px;">
                        <div>❤️ 血條：<span id="stat-hp" style="color: #22c55e; font-weight: bold;">1000 / 1000</span></div>
                        <div>🔥 餘燼點數：<span id="stat-embers" style="color: #f59e0b; font-weight: bold;">0</span></div>
                        <div>💎 維度核心：<span id="stat-cores" style="color: #38bdf8; font-weight: bold;">0</span></div>
                        <div>⚡ 速度/攻擊：<span id="stat-other" style="color: var(--text-color);">100 / 200</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 遊戲設定彈窗 (移至選單叫出) -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>遊戲設定</h3>
            <div class="input-group">
                <label for="api-key-input">API Key：</label>
                <input type="password" id="api-key-input" placeholder="請輸入您的 API Key">
            </div>
            <div class="input-group">
                <label for="ai-model-select">選擇 AI 模型：</label>
                <select id="ai-model-select">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4o-mini">GPT-4o-mini</option>
                    <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                </select>
            </div>
            <div class="input-group">
                <label for="theme-select">介面主題：</label>
                <select id="theme-select">
                    <option value="dark">黑夜模式 (Dark)</option>
                    <option value="light">白晝模式 (Light)</option>
                </select>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-save-api">儲存設定</button>
                <button type="button" class="btn-secondary" id="btn-test-api">測試 AI</button>
                <button type="button" class="btn-secondary" id="btn-close-settings">關閉</button>
            </div>
        </div>
    </div>

    <!-- 個人檔案彈窗 (點擊右上角頭像開啟) -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>執行者檔案設定</h3>
            <div class="input-group" style="text-align: center; margin-top: 10px;">
                <img id="modal-avatar-preview" src="" alt="頭像預覽" class="avatar-preview" style="margin: 0 auto 10px auto; display: block;">
                <label for="avatar-file-input" style="display: inline-block; background-color: #374151; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #fff;">
                    📁 上傳自訂頭像
                </label>
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">
                <button type="button" class="btn-secondary" style="margin-top: 5px; font-size: 12px; padding: 4px;" id="btn-default-avatar">使用預設頭像</button>
            </div>
            <div class="input-group">
                <label for="profile-name-input">執行者代號 / 名字：</label>
                <input type="text" id="profile-name-input" placeholder="請輸入您的名字">
            </div>
            <div class="input-group">
                <label for="profile-personality-input">個性描述：</label>
                <input type="text" id="profile-personality-input" placeholder="例如：冷靜、果斷...">
            </div>
            <div class="input-group">
                <label for="profile-likes-input">喜歡的事物 / 興趣：</label>
                <textarea id="profile-likes-input" placeholder="例如：策略遊戲..."></textarea>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-save-profile">儲存檔案</button>
                <button type="button" class="btn-secondary" id="profile-close-btn">關閉</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://xjuspusyimjdgitsbaku.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqdXNwdXN5aW1qZGdpdHNiYWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NjQ0MjAsImV4cCI6MjEwMDM0MDQyMH0.JxOOR-_7UpnRTlA2Luh8htAoCJAUEcrAAd-o2KXp1s8';
            
            let supabase = null;
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.error("Supabase 初始化失敗", e);
            }

            const GAME_WORLD_RULES = `--- ［臨界軸：萬界修正錄］世界觀與核心規則 v1.0 ---
【戰鬥-回合制】採《崩壞：星穹鐵道》模式。
【回合】分劇情與戰鬥回合。
【基礎數值】生命值：1000 | 攻擊力：200 | 防禦力：800 | 速度：100`.trim();

            const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23818cf8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

            let currentUser = null;
            let playerGameData = { 
                apiKey: "", 
                aiModel: "gemini-2.5-flash",
                theme: "dark",
                stats: { hp: 1000, maxHp: 1000, embers: 0, cores: 0 },
                storyText: "主神空間連結待機中，等待執行者發起指令。",
                profile: { name: "執行者", avatar: DEFAULT_AVATAR, personality: "", likes: "", setupCompleted: false }
            };

            const applyTheme = (theme) => {
                document.documentElement.setAttribute('data-theme', theme);
                const themeSelect = document.getElementById('theme-select');
                if (themeSelect) themeSelect.value = theme;
            };

            const bind = (id, event, fn) => {
                const el = document.getElementById(id);
                if (el) el.addEventListener(event, fn);
            };

            async function callAI(promptText) {
                const apiKey = playerGameData.apiKey;
                const model = playerGameData.aiModel || "gemini-2.5-flash";

                if (!apiKey) throw new Error("尚未設定 API Key，請至選單中的遊戲設定填寫。");

                const fullSystemPrompt = `${GAME_WORLD_RULES}\n\n【目前執行者檔案】\n名字：${playerGameData.profile.name}\n個性：${playerGameData.profile.personality}\n喜好：${playerGameData.profile.likes}`;

                if (model.includes("gemini")) {
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: `${fullSystemPrompt}\n\n玩家指令：${promptText}` }] }] })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "Gemini API 請求失敗");
                    return data.candidates[0].content.parts[0].text;
                } else {
                    const endpoint = `https://api.openai.com/v1/chat/completions`;
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: model, messages: [{ role: "system", content: fullSystemPrompt }, { role: "user", content: promptText }] })
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message || "AI API 請求失敗");
                    return data.choices[0].message.content;
                }
            }

            bind('btn-yes', 'click', () => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'block';
            });
            bind('btn-no', 'click', () => alert('你將繼續卑微的活著'));
            bind('btn-back-intro', 'click', () => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('intro-screen').style.display = 'block';
            });

            bind('btn-register', 'click', async () => {
                if (!supabase) return alert('Supabase 未初始化');
                const email = document.getElementById('email-input').value.trim();
                const password = document.getElementById('password-input').value;
                if (!email || !password) return alert('請輸入完整的信箱與密碼！');
                const { error } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: window.location.href } });
                if (error) alert('註冊失敗：\n' + error.message);
                else alert('註冊要求已送出！請至信箱驗證或直接登入。');
            });

            bind('btn-login', 'click', async () => {
                if (!supabase) return alert('Supabase 未初始化');
                const email = document.getElementById('email-input').value.trim();
                const password = document.getElementById('password-input').value;
                if (!email || !password) return alert('請輸入信箱與密碼！');
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert('登入失敗：\n' + error.message);
                else { currentUser = data.user; enterGameSession(); }
            });

            const handleLogout = async () => {
                if (supabase) await supabase.auth.signOut();
                location.reload();
            };
            bind('menu-logout', 'click', handleLogout);

            const openNav = () => document.getElementById("mySidebar").style.width = "250px";
            const closeNav = () => document.getElementById("mySidebar").style.width = "0";
            bind('btn-open-nav', 'click', openNav);
            bind('btn-close-nav', 'click', closeNav);
            bind('menu-home', 'click', () => closeNav());
            bind('menu-profile', 'click', () => { openProfileModal(); closeNav(); });
            bind('menu-settings', 'click', () => { openSettings(); closeNav(); });
            
            // 右上角頭像點擊事件：開啟個人檔案
            bind('btn-open-profile-modal', 'click', openProfileModal);

            bind('btn-enter-dungeon', 'click', async () => {
                if (!playerGameData.apiKey) {
                    alert('尚未設定 API Key！請先至選單中的遊戲設定填寫。');
                    openSettings();
                    return;
                }
                
                try {
                    alert('正在連接主神空間與 AI 核心，產生副本開場...');
                    const aiReply = await callAI("執行者已進入副本，請生成一段第一人稱的開場劇情簡述。");
                    playerGameData.storyText = aiReply;
                    updateUI();
                    await saveToCloud();
                } catch (err) {
                    alert('AI 連線失敗：\n' + err.message);
                }
            });

            bind('btn-test-api', 'click', async () => {
                const key = document.getElementById('api-key-input').value.trim();
                if (!key) return alert('請先輸入 API Key 才能測試！');
                playerGameData.apiKey = key;
                playerGameData.aiModel = document.getElementById('ai-model-select').value;

                try {
                    alert('正在測試與 AI 模型的連線...');
                    const testReply = await callAI("系統連線測試，請回覆：連線正常。");
                    alert('測試成功！AI 回應：\n' + testReply);
                } catch (err) {
                    alert('測試失敗：\n' + err.message);
                }
            });

            bind('btn-save-api', 'click', async () => {
                playerGameData.apiKey = document.getElementById('api-key-input').value.trim();
                playerGameData.aiModel = document.getElementById('ai-model-select').value;
                playerGameData.theme = document.getElementById('theme-select').value;
                applyTheme(playerGameData.theme);

                await saveToCloud();
                alert('設定已成功儲存！');
                closeSettings();
            });
            bind('btn-close-settings', 'click', closeSettings);

            bind('theme-select', 'change', (e) => applyTheme(e.target.value));

            bind('avatar-file-input', 'change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    playerGameData.profile.avatar = evt.target.result;
                    document.getElementById('modal-avatar-preview').src = evt.target.result;
                };
                reader.readAsDataURL(file);
            });
            bind('btn-default-avatar', 'click', () => {
                playerGameData.profile.avatar = DEFAULT_AVATAR;
                document.getElementById('modal-avatar-preview').src = DEFAULT_AVATAR;
            });
            bind('btn-save-profile', 'click', async () => {
                const name = document.getElementById('profile-name-input').value.trim();
                if (!name) return alert('請輸入名字！');
                playerGameData.profile.name = name;
                playerGameData.profile.personality = document.getElementById('profile-personality-input').value.trim();
                playerGameData.profile.likes = document.getElementById('profile-likes-input').value.trim();
                playerGameData.profile.setupCompleted = true;
                await saveToCloud();
                updateUI();
                closeProfileModal();
                alert('執行者檔案儲存成功！');
            });
            bind('profile-close-btn', 'click', closeProfileModal);

            if (supabase) {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) { currentUser = session.user; enterGameSession(); }
                });
            }

            function openSettings() { 
                document.getElementById('api-key-input').value = playerGameData.apiKey || "";
                document.getElementById('ai-model-select').value = playerGameData.aiModel || "gemini-2.5-flash";
                document.getElementById('theme-select').value = playerGameData.theme || "dark";
                document.getElementById('settings-modal').style.display = 'flex'; 
            }
            function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
            
            function openProfileModal() {
                const p = playerGameData.profile;
                document.getElementById('profile-name-input').value = p.name || "";
                document.getElementById('profile-personality-input').value = p.personality || "";
                document.getElementById('profile-likes-input').value = p.likes || "";
                document.getElementById('modal-avatar-preview').src = p.avatar || DEFAULT_AVATAR;
                if (p.setupCompleted) document.getElementById('profile-close-btn').style.display = 'block';
                document.getElementById('profile-modal').style.display = 'flex';
            }
            function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }

            async function enterGameSession() {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';

                const { data } = await supabase.from('player_saves').select('save_data').eq('id', currentUser.id).single();
                if (data && data.save_data) {
                    const sd = data.save_data;
                    playerGameData = {
                        apiKey: sd.apiKey || "",
                        aiModel: sd.aiModel || "gemini-2.5-flash",
                        theme: sd.theme || "dark",
                        stats: sd.stats || { hp: 1000, maxHp: 1000, embers: 0, cores: 0 },
                        storyText: sd.storyText || "主神空間連結待機中，等待執行者發起指令。",
                        profile: {
                            name: sd.profile?.name || currentUser.email.split('@')[0],
                            avatar: sd.profile?.avatar || DEFAULT_AVATAR,
                            personality: sd.profile?.personality || "",
                            likes: sd.profile?.likes || "",
                            setupCompleted: sd.profile?.setupCompleted ?? false
                        }
                    };
                    if (playerGameData.theme) applyTheme(playerGameData.theme);
                } else {
                    playerGameData = { 
                        apiKey: "", 
                        aiModel: "gemini-2.5-flash",
                        theme: "dark",
                        stats: { hp: 1000, maxHp: 1000, embers: 0, cores: 0 },
                        storyText: "主神空間連結待機中，等待執行者發起指令。",
                        profile: { name: currentUser.email.split('@')[0], avatar: DEFAULT_AVATAR, setupCompleted: false } 
                    };
                    await saveToCloud();
                }

                updateUI();
                if (!playerGameData.profile.setupCompleted) {
                    openProfileModal();
                    document.getElementById('profile-close-btn').style.display = 'none';
                }
            }

            function updateUI() {
                const p = playerGameData.profile;
                const s = playerGameData.stats;
                document.getElementById('top-display-avatar').src = p.avatar || DEFAULT_AVATAR;
                document.getElementById('top-display-name').innerText = p.name || "執行者";
                
                document.getElementById('story-summary').innerText = `劇情簡述：${playerGameData.storyText}`;
                document.getElementById('stat-hp').innerText = `${s.hp} / ${s.maxHp}`;
                document.getElementById('stat-embers').innerText = s.embers;
                document.getElementById('stat-cores').innerText = s.cores;
            }

            async function saveToCloud() {
                if (!currentUser || !supabase) return;
                await supabase.from('player_saves').upsert({ id: currentUser.id, save_data: playerGameData, updated_at: new Date() });
            }
        });
    </script>
</body>
</html>
