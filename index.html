<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臨界軸：萬界修正錄</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        h2, h3 {
            margin-top: 0;
            color: #ffffff;
            text-align: center;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #aaa;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            flex: 1;
            padding: 12px 10px;
            border: none;
            border-radius: 6px;
            background-color: var(--accent-color);
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.btn-secondary {
            background-color: #374151;
        }

        button.btn-secondary:hover {
            background-color: #4b5563;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-badge.unset {
            background-color: #ef444422;
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .status-badge.set {
            background-color: #10b98122;
            color: #10b981;
            border: 1px solid #10b981;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
        }

        .rule-preview {
            background-color: #181818;
            padding: 12px;
            border-radius: 6px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            color: #bbb;
            white-space: pre-wrap;
            border: 1px solid #282828;
            margin-top: 10px;
        }

        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 2500;
            top: 0;
            left: 0;
            background-color: #1a1a1a;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            border-right: 1px solid var(--border-color);
        }

        .sidebar a {
            padding: 12px 20px;
            text-decoration: none;
            font-size: 15px;
            color: #ccc;
            display: block;
            border-bottom: 1px solid #252525;
        }

        .sidebar a:hover {
            color: #fff;
            background-color: #333;
        }

        .sidebar .menu-header {
            background-color: #0d9488;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
        }

        .sidebar .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
        }

        .menu-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #262626;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            gap: 8px;
        }

        .hamburger-btn {
            background: #374151;
            border: none;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            width: auto;
            flex: unset;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .hamburger-btn:hover {
            background-color: #4b5563;
        }

        .profile-card {
            background-color: #262626;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border-color);
        }

        .avatar-preview {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            background-color: #333;
        }
    </style>
</head>
<body>

    <div id="mySidebar" class="sidebar">
        <button class="close-btn" id="btn-close-nav">&times;</button>
        <a href="#" id="menu-home">🏠 系統首頁</a>
        <div class="menu-header">執行者設定</div>
        <a href="#" id="menu-profile">👤 玩家個人檔案設定</a>
        <div class="menu-header">系統管理</div>
        <a href="#" id="menu-settings">⚙️ 設定 (修改 API)</a>
        <a href="#" id="menu-logout" style="color: #ef4444;">🚪 離開系統 / 登出</a>
    </div>

    <div class="container">
        <div id="intro-screen">
            <h2>[臨界軸：萬界修正錄]</h2>
            <div style="background-color: #262626; padding: 18px; border-radius: 8px; margin: 16px 0; font-size: 15px; line-height: 1.6; color: #e0e0e0; text-align: center;">
                <p style="margin-top: 0; font-size: 18px; color: #818cf8; font-weight: bold;">想明白生命的意義嗎？想真正的……活著嗎？</p>
                <p style="color: #aaa; font-size: 13px; margin-bottom: 0;">當你做出選擇的那一刻起，多元宇宙的命脈與修正錄便已將你鎖定。</p>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-yes">YES</button>
                <button type="button" class="btn-secondary" id="btn-no">NO</button>
            </div>
        </div>

        <div id="auth-screen" style="display: none;">
            <h2>[臨界軸：萬界修正錄]</h2>
            <p style="text-align: center; color: #888; font-size: 14px; margin-bottom: 20px;">請登入以同步您的雲端遊戲存檔</p>
            <div class="input-group">
                <label for="email-input">電子信箱 (Email)</label>
                <input type="email" id="email-input" placeholder="example@email.com">
            </div>
            <div class="input-group">
                <label for="password-input">密碼</label>
                <input type="password" id="password-input" placeholder="請輸入密碼 (至少 6 位數)">
            </div>
            <div class="btn-group">
                <button type="button" id="btn-login">登入</button>
                <button type="button" class="btn-secondary" id="btn-register">註冊新帳號</button>
            </div>
            <button type="button" class="btn-secondary" id="btn-back-intro" style="width: 100%; margin-top: 10px;">返回遊戲介紹</button>
        </div>

        <div id="game-screen" style="display: none;">
            <div class="menu-bar">
                <button type="button" class="hamburger-btn" id="btn-open-nav">☰ 選單</button>
                <span id="user-display-email" style="font-size: 12px; color: #bbb; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">載入中...</span>
                <a href="#" id="link-logout" style="font-size: 12px; color: #ef4444; text-decoration: none; font-weight: bold; white-space: nowrap;">離開系統</a>
            </div>
            <div id="section-home">
                <h2>主神空間大廳</h2>
                <p id="welcome-msg" style="color: #818cf8; font-weight: bold; text-align: center; margin-bottom: 16px;"></p>
                <div class="profile-card">
                    <img id="display-avatar" src="" alt="頭像" class="avatar-preview">
                    <div style="flex: 1; overflow: hidden;">
                        <div id="display-profile-name" style="font-weight: bold; font-size: 16px; color: #fff; margin-bottom: 4px;">執行者</div>
                        <div id="display-profile-info" style="font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">個性 / 喜好：尚未設定</div>
                    </div>
                    <button type="button" class="btn-secondary" style="padding: 6px 10px; font-size: 12px; flex: unset;" id="btn-open-profile-inline">編輯</button>
                </div>
                <div style="background-color: #262626; padding: 12px 16px; border-radius: 8px; margin: 16px 0; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 14px; color: #ccc;">API 金鑰狀態：</span>
                    <span id="api-status" class="status-badge unset">未設定</span>
                </div>
                <div style="margin-top: 16px;">
                    <label style="margin-bottom: 8px;">目前遊戲載入之版本規則：</label>
                    <div id="rule-display" class="rule-preview"></div>
                </div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button type="button" class="btn-secondary" id="btn-open-settings-main">⚙️ 設定 (修改 API)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>遊戲設定</h3>
            <div class="input-group">
                <label for="api-key-input">你的 API Key：</label>
                <input type="password" id="api-key-input" placeholder="請貼上您的 API Key (例如 sk-...)">
            </div>
            <div class="btn-group">
                <button type="button" id="btn-save-api">儲存設定</button>
                <button type="button" class="btn-secondary" id="btn-close-settings">關閉</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3>執行者檔案設定</h3>
            <div class="input-group" style="text-align: center; margin-top: 10px;">
                <img id="modal-avatar-preview" src="" alt="頭像預覽" class="avatar-preview" style="margin: 0 auto 10px auto; display: block;">
                <label for="avatar-file-input" style="display: inline-block; background-color: #374151; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: #fff;">
                    📁 上傳自訂頭像
                </label>
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">
                <button type="button" class="btn-secondary" style="margin-top: 5px; font-size: 12px; padding: 4px;" id="btn-default-avatar">使用預設頭像</button>
            </div>
            <div class="input-group">
                <label for="profile-name-input">執行者代號 / 名字：</label>
                <input type="text" id="profile-name-input" placeholder="請輸入您的名字">
            </div>
            <div class="input-group">
                <label for="profile-personality-input">個性描述：</label>
                <input type="text" id="profile-personality-input" placeholder="例如：冷靜、果斷...">
            </div>
            <div class="input-group">
                <label for="profile-likes-input">喜歡的事物 / 興趣：</label>
                <textarea id="profile-likes-input" placeholder="例如：策略遊戲..."></textarea>
            </div>
            <div class="btn-group">
                <button type="button" id="btn-save-profile">儲存檔案</button>
                <button type="button" class="btn-secondary" id="profile-close-btn">關閉</button>
            </div>
        </div>
    </div>

    <div id="tutorial-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>新手引導</h3>
            <div id="tutorial-text" style="font-size: 14px; line-height: 1.6; color: #ccc; margin: 15px 0;"></div>
            <div class="btn-group">
                <button type="button" id="tutorial-next-btn">下一步</button>
                <button type="button" class="btn-secondary" id="tutorial-skip-btn">跳過引導</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SUPABASE_URL = 'https://xjuspusyimjdgitsbaku.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqdXNwdXN5aW1qZGdpdHNiYWt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NjQ0MjAsImV4cCI6MjEwMDM0MDQyMH0.JxOOR-_7UpnRTlA2Luh8htAoCJAUEcrAAd-o2KXp1s8';
            
            let supabase = null;
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                console.error("Supabase 初始化失敗", e);
                alert("Supabase 初始化失敗：" + e.message);
            }

            const GAME_WORLD_RULES = `--- ［臨界軸：萬界修正錄］世界觀與核心規則 v1.0 ---
【戰鬥-回合制】採《崩壞：星穹鐵道》模式。
【回合】分劇情與戰鬥回合。
【基礎數值】生命值：1000 | 攻擊力：200 | 防禦力：800 | 速度：100`.trim();

            const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23818cf8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/></svg>";

            let currentUser = null;
            let playerGameData = { 
                apiKey: "", 
                progress: {}, 
                tutorialCompleted: false,
                profile: { name: "執行者", avatar: DEFAULT_AVATAR, personality: "", likes: "", setupCompleted: false }
            };
            let currentTutorialStep = 0;
            const tutorialSteps = [
                "歡迎來到《臨界軸：萬界修正錄》！首先請為自己設定一份【個人檔案】。",
                "點擊左上角的【☰ 選單】可以隨時展開功能抽屜。",
                "別忘了透過選單前往設定輸入你的 API Key。祝你武運昌隆！"
            ];

            const ruleDisplay = document.getElementById('rule-display');
            if (ruleDisplay) ruleDisplay.innerText = GAME_WORLD_RULES;

            const bind = (id, event, fn) => {
                const el = document.getElementById(id);
                if (el) el.addEventListener(event, fn);
            };

            bind('btn-yes', 'click', () => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'block';
            });
            bind('btn-no', 'click', () => alert('你將繼續卑微的活著'));
            bind('btn-back-intro', 'click', () => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('intro-screen').style.display = 'block';
            });

            bind('btn-register', 'click', async () => {
                if (!supabase) {
                    alert('Supabase 未初始化成功！');
                    return;
                }
                const email = document.getElementById('email-input').value.trim();
                const password = document.getElementById('password-input').value;
                if (!email || !password) {
                    alert('請輸入完整的信箱與密碼！');
                    return;
                }
                if (password.length < 6) {
                    alert('Supabase 預設密碼長度至少需要 6 個字元！');
                    return;
                }

                try {
                    const { data, error } = await supabase.auth.signUp({ 
                        email, 
                        password, 
                        options: { emailRedirectTo: window.location.href } 
                    });

                    if (error) {
                        alert('註冊失敗：\n' + error.message);
                    } else {
                        alert('註冊要求已送出！若後台未關閉 Email 驗證，請至信箱點擊驗證連結後再登入；若已關閉，可直接點擊登入。');
                    }
                } catch (err) {
                    alert('註冊過程發生非預期錯誤：\n' + err.message);
                }
            });

            bind('btn-login', 'click', async () => {
                if (!supabase) {
                    alert('Supabase 未初始化成功！');
                    return;
                }
                const email = document.getElementById('email-input').value.trim();
                const password = document.getElementById('password-input').value;
                if (!email || !password) {
                    alert('請輸入信箱與密碼！');
                    return;
                }

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert('登入失敗：\n' + error.message);
                    } else {
                        currentUser = data.user;
                        enterGameSession();
                    }
                } catch (err) {
                    alert('登入過程發生非預期錯誤：\n' + err.message);
                }
            });

            const handleLogout = async () => {
                if (supabase) await supabase.auth.signOut();
                location.reload();
            };
            bind('link-logout', 'click', handleLogout);
            bind('menu-logout', 'click', handleLogout);

            const openNav = () => document.getElementById("mySidebar").style.width = "250px";
            const closeNav = () => document.getElementById("mySidebar").style.width = "0";
            bind('btn-open-nav', 'click', openNav);
            bind('btn-close-nav', 'click', closeNav);
            bind('menu-home', 'click', () => { closeNav(); });
            bind('menu-profile', 'click', () => { openProfileModal(); closeNav(); });
            bind('menu-settings', 'click', () => { openSettings(); closeNav(); });
            bind('btn-open-profile-inline', 'click', openProfileModal);
            bind('btn-open-settings-main', 'click', openSettings);

            bind('btn-save-api', 'click', async () => {
                const key = document.getElementById('api-key-input').value.trim();
                if (!key) return alert('請輸入有效的 API Key！');
                playerGameData.apiKey = key;
                await saveToCloud();
                updateApiStatusUI(true);
                alert('API Key 已儲存！');
                closeSettings();
            });
            bind('btn-close-settings', 'click', closeSettings);

            bind('avatar-file-input', 'change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    playerGameData.profile.avatar = evt.target.result;
                    document.getElementById('modal-avatar-preview').src = evt.target.result;
                };
                reader.readAsDataURL(file);
            });
            bind('btn-default-avatar', 'click', () => {
                playerGameData.profile.avatar = DEFAULT_AVATAR;
                document.getElementById('modal-avatar-preview').src = DEFAULT_AVATAR;
            });
            bind('btn-save-profile', 'click', async () => {
                const name = document.getElementById('profile-name-input').value.trim();
                if (!name) return alert('請輸入名字！');
                playerGameData.profile.name = name;
                playerGameData.profile.personality = document.getElementById('profile-personality-input').value.trim();
                playerGameData.profile.likes = document.getElementById('profile-likes-input').value.trim();
                playerGameData.profile.setupCompleted = true;
                await saveToCloud();
                updateProfileUI();
                closeProfileModal();
                alert('執行者檔案儲存成功！');
                if (!playerGameData.tutorialCompleted) startTutorial();
            });
            bind('profile-close-btn', 'click', closeProfileModal);

            bind('tutorial-next-btn', 'click', async () => {
                currentTutorialStep++;
                if (currentTutorialStep < tutorialSteps.length) {
                    document.getElementById('tutorial-text').innerText = tutorialSteps[currentTutorialStep];
                    if (currentTutorialStep === tutorialSteps.length - 1) {
                        document.getElementById('tutorial-next-btn').innerText = '完成引導';
                    }
                } else {
                    playerGameData.tutorialCompleted = true;
                    await saveToCloud();
                    document.getElementById('tutorial-modal').style.display = 'none';
                }
            });
            bind('tutorial-skip-btn', 'click', async () => {
                playerGameData.tutorialCompleted = true;
                await saveToCloud();
                document.getElementById('tutorial-modal').style.display = 'none';
            });

            if (supabase) {
                supabase.auth.getSession().then(({ data: { session } }) => {
                    if (session) { currentUser = session.user; enterGameSession(); }
                });
            }

            function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
            function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
            function openProfileModal() {
                const p = playerGameData.profile;
                document.getElementById('profile-name-input').value = p.name || "";
                document.getElementById('profile-personality-input').value = p.personality || "";
                document.getElementById('profile-likes-input').value = p.likes || "";
                document.getElementById('modal-avatar-preview').src = p.avatar || DEFAULT_AVATAR;
                if (p.setupCompleted) document.getElementById('profile-close-btn').style.display = 'block';
                document.getElementById('profile-modal').style.display = 'flex';
            }
            function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }

            async function enterGameSession() {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('welcome-msg').innerText = `歡迎回來，${currentUser.email}`;
                document.getElementById('user-display-email').innerText = currentUser.email;

                const { data } = await supabase.from('player_saves').select('save_data').eq('id', currentUser.id).single();
                if (data && data.save_data) {
                    playerGameData = data.save_data;
                    if (!playerGameData.profile) playerGameData.profile = { name: "執行者", avatar: DEFAULT_AVATAR, setupCompleted: false };
                    if (playerGameData.apiKey) {
                        updateApiStatusUI(true);
                        document.getElementById('api-key-input').value = playerGameData.apiKey;
                    }
                } else {
                    playerGameData = { apiKey: "", progress: {}, tutorialCompleted: false, profile: { name: currentUser.email.split('@')[0], avatar: DEFAULT_AVATAR, setupCompleted: false } };
                    saveToCloud();
                }

                updateProfileUI();
                if (!playerGameData.profile.setupCompleted) {
                    openProfileModal();
                    document.getElementById('profile-close-btn').style.display = 'none';
                } else if (!playerGameData.tutorialCompleted) {
                    startTutorial();
                }
            }

            function updateProfileUI() {
                const p = playerGameData.profile;
                document.getElementById('display-avatar').src = p.avatar || DEFAULT_AVATAR;
                document.getElementById('display-profile-name').innerText = p.name || "執行者";
                document.getElementById('display-profile-info').innerText = `個性：${p.personality || '未填寫'} | 喜好：${p.likes || '未填寫'}`;
            }

            function updateApiStatusUI(isSet) {
                const badge = document.getElementById('api-status');
                if (!badge) return;
                badge.innerText = isSet ? '已設定 (已雲端記憶)' : '未設定';
                badge.className = isSet ? 'status-badge set' : 'status-badge unset';
            }

            async function saveToCloud() {
                if (!currentUser || !supabase) return;
                await supabase.from('player_saves').upsert({ id: currentUser.id, save_data: playerGameData, updated_at: new Date() });
            }

            function startTutorial() {
                currentTutorialStep = 0;
                document.getElementById('tutorial-text').innerText = tutorialSteps[0];
                document.getElementById('tutorial-modal').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
